<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIEVERSE</title>
    <!-- Importation de la police Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- En-tête -->
    <header class="navbar" id="navbar">
        <div class="logo">MOVIEVERSE</div>
        <ul class="nav-links">
            <li><a href="#" class="nav-item active" data-type="trending">Accueil</a></li>
            <li><a href="#" class="nav-item" data-type="tv">Séries</a></li>
            <li><a href="#" class="nav-item" data-type="movie">Films</a></li>
            <li><a href="#" class="nav-item">Ma Liste</a></li>
        </ul>
        <div class="nav-actions">
            <!-- Icône Cloche -->
            <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
            <!-- Barre de recherche (Icône uniquement) -->
            <label class="search-container" for="search-input">
                <svg class="icon search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                    <circle cx="11" cy="11" r="7" fill="none" stroke="#ffffff" stroke-width="2"/>
                    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Rechercher...">
            </label>
        </div>
    </header>

    <main>
        <!-- Barre de filtres par genre (déplacée pour défiler avec la page) -->
        <div class="genre-filters-container" id="genre-filters-container">
            <div class="genre-filters" id="genre-filters" style="display: none;"></div>
            
            <!-- Bouton Filtre pour Mobile -->
            <button class="mobile-filter-btn" id="mobile-filter-btn" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>
                Filtrer par Genre
            </button>
        </div>

        <!-- Section Héros -->
        <section class="hero" id="hero-section">
            <div class="hero-content">
                <h1 id="hero-title">Chargement...</h1>
                <div class="hero-meta" id="hero-meta">
                    &nbsp;
                </div>
                <p class="hero-synopsis" id="hero-synopsis">
                    Veuillez patienter pendant le chargement des films...
                </p>
                <div class="hero-buttons">
                    <button class="btn btn-primary" id="watch-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 5V19L19 12L8 5Z"/>
                        </svg>
                        Regarder
                    </button>
                    <button class="btn btn-secondary" id="see-more-btn">Voir Plus</button>
                </div>
            </div>
        </section>

        <!-- Section Populaire / Carrousel -->
        <section class="popular" id="popular-section">
            <h2 class="section-title" id="section-title">Tendances Actuelles</h2>
            
            <div class="carousel-container" id="carousel">
                <!-- Les cartes de films seront injectées ici par JS -->
            </div>
        </section>
    </main>

    <!-- Overlay pour le choix de genre sur mobile -->
    <div class="mobile-genre-overlay" id="mobile-genre-overlay">
        <div class="mobile-genre-content">
            <div class="mobile-genre-header">
                <h3>Choisir un Genre</h3>
                <button class="close-overlay" id="close-genre-overlay">&times;</button>
            </div>
            <div class="mobile-genre-grid" id="mobile-genre-grid">
                <!-- Injecté par JS -->
            </div>
        </div>
    </div>

    <!-- Navigation Basse pour Mobile (Style Premium) -->
    <nav class="bottom-nav">
        <a href="#" class="bottom-nav-item active" data-type="trending">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Accueil</span>
        </a>
        <a href="#" class="bottom-nav-item" data-type="tv">
            <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            <span>Séries</span>
        </a>
        <a href="#" class="bottom-nav-item" data-type="movie">
            <svg viewBox="0 0 24 24"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
            <span>Films</span>
        </a>
        <a href="#" class="bottom-nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span>Ma Liste</span>
        </a>
    </nav>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
