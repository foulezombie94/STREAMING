<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIEVERSE - Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- En-tête -->
    <header class="navbar" id="navbar">
        <a href="/" class="logo">MOVIEVERSE</a>
        <div class="nav-actions">
            <a href="/" style="display:flex; align-items:center; gap:5px; font-weight:600; text-transform:uppercase; font-size:14px; letter-spacing:1px; color:#A3A3A3; transition:color 0.3s ease;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z"/>
                </svg>
                Back to Home
            </a>
        </div>
    </header>

    <main>
        <section class="details-hero" id="details-hero">
            <div class="details-content-wrapper">
                <div class="poster-container">
                    <img id="details-poster" src="" alt="Poster" />
                </div>
                <div class="info-container">
                    <h1 id="details-title">Chargement...</h1>
                    <div class="hero-meta" id="details-meta" style="margin-bottom: 10px;"></div>
                    <div class="genres" id="details-genres"></div>
                    <p class="tagline" id="details-tagline"></p>
                    <p class="hero-synopsis" id="details-synopsis" style="-webkit-line-clamp: 10; max-width: 100%;">Récupération des informations...</p>
                    
                    <div class="extra-info-grid" id="extra-info-grid"></div>
                    
                    <div class="cast-section">
                        <h3 style="margin-bottom: 15px; font-size: 18px; color: #fff;">Top Cast</h3>
                        <div class="cast-list" id="cast-list"></div>
                    </div>
                    
                    <div class="hero-buttons" style="margin-top: 30px;">
                        <button class="btn btn-primary" id="watch-movie-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 5V19L19 12L8 5Z"/>
                            </svg>
                            Regarder
                        </button>
                        <button class="btn btn-secondary" id="play-trailer-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"></path>
                                <rect x="3" y="6" width="12" height="12" rx="2" ry="2"></rect>
                            </svg>
                            Bande-Annonce
                        </button>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Embedded Player Section -->
        <section class="player-section" id="player-section" style="display: none;">
            <div class="player-container">
                <div class="player-controls" id="player-controls" style="display: none;">
                    <div class="select-wrapper">
                        <select id="season-select" class="player-select">
                            <option value="">Chargement...</option>
                        </select>
                    </div>
                    <div class="select-wrapper">
                        <select id="episode-select" class="player-select">
                            <option value="">Chargement...</option>
                        </select>
                    </div>
                </div>
                <div class="iframe-wrapper">
                    <iframe id="video-iframe" src="" frameborder="0" allowfullscreen referrerpolicy="origin"></iframe>
                </div>
                <button class="close-player-btn" id="close-player-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"/>
                    </svg>
                    Fermer le lecteur
                </button>
            </div>
        </section>

        <!-- Trailer Modal -->
        <div class="trailer-modal" id="trailer-modal">
            <div class="modal-content">
                <span class="close-modal" id="close-modal">&times;</span>
                <iframe id="trailer-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Actor Modal -->
        <div class="trailer-modal" id="actor-modal">
            <div class="modal-content actor-modal-content">
                <span class="close-modal" id="close-actor-modal">&times;</span>
                <div class="actor-details-container">
                    <img id="actor-modal-img" src="" alt="Actor">
                    <div class="actor-info">
                        <h2 id="actor-modal-name">Chargement...</h2>
                        <p class="actor-meta" id="actor-modal-meta"></p>
                        <div class="actor-bio" id="actor-modal-bio"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actor Hover Card -->
        <div id="actor-hover-card" class="actor-hover-card">
            <div class="hover-card-content">
                <img id="hover-card-img" src="" alt="Actor">
                <div class="hover-card-info">
                    <h4 id="hover-card-name">Chargement...</h4>
                    <p class="hover-card-role" id="hover-card-role"></p>
                    <div class="hover-card-meta" id="hover-card-meta"></div>
                    <p class="hover-card-bio" id="hover-card-bio"></p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/src/details.ts"></script>
</body>
</html>
